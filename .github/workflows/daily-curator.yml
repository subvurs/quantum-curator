name: Daily Quantum Curation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual triggers

permissions:
  contents: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
  UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
  BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
  BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
  SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
  SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
  TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
  TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
  TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
  SITE_URL: https://quantumcrier.com
  SITE_NAME: Quantum Crier
  SITE_DESCRIPTION: "Daily curated quantum computing news and insights by Mark Eatherly"

jobs:
  curate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore database cache
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: curator-db-${{ github.run_id }}
          restore-keys: |
            curator-db-

      - name: Initialize database
        run: quantum-curator init

      - name: Check database status
        run: |
          if [ -f data/curator.db ]; then
            echo "✓ Database restored from cache"
            sqlite3 data/curator.db "SELECT COUNT(*) || ' raw articles, ' || (SELECT COUNT(*) FROM curated_posts WHERE status='published') || ' published posts' FROM raw_articles;"
          else
            echo "✗ Fresh database - no cache found"
          fi

      - name: Fetch articles
        run: quantum-curator fetch

      - name: Curate content
        run: quantum-curator curate --limit 500 --auto-publish --create-digest

      - name: Build Quantum Crier site
        run: quantum-curator build --output ./public

      - name: Build Qrater dashboard
        run: quantum-curator build-qrater --output ./qrater_public

      - name: Deploy Quantum Crier to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          user_name: 'Quantum Curator Bot'
          user_email: 'curator@quantum-curator.com'
          commit_message: 'Daily curation update'

      - name: Deploy Qrater to GitHub Pages
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          cd qrater_public
          git init
          git checkout -b gh-pages
          git config user.name "Quantum Curator Bot"
          git config user.email "curator@quantum-curator.com"
          git add -A
          git commit -m "Daily Qrater dashboard update"
          git push --force https://x-access-token:${DEPLOY_TOKEN}@github.com/subvurs/qrater.git gh-pages

      - name: Share to Bluesky
        continue-on-error: true
        run: quantum-curator share --limit 5

      # Twitter/X disabled — account suspended (April 2026)
      # - name: Share to Twitter/X
      #   continue-on-error: true
      #   run: quantum-curator tweet --limit 5

      # --- Quantum Intel pipeline (migrated from legacy launchd cron, Jun 2026)
      # Phase 4a: run inside the daily-curator workflow rather than the
      # macOS launchd plist that kept hanging on SIGALRM deadlines.
      # Each step is continue-on-error so a single LLM hiccup can't take
      # down the rest of the daily run.
      #
      # intel-email runs synth + summary + send in one pass; we don't
      # call synthesize-intel separately because intel-email would do
      # its own synth anyway and reading briefs from disk between
      # steps is added wiring for no LLM savings (one call per day).
      # share-intel-summary computes its own (small) summary for the
      # Bluesky post and is idempotent on summary_date so re-runs in
      # the same UTC day are no-ops after the first success.

      - name: Send Intel daily email
        continue-on-error: true
        run: quantum-curator intel-email --days 1 --max-briefs 5

      - name: Share Intel summary to Bluesky
        continue-on-error: true
        run: quantum-curator share-intel-summary --days 1 --link https://qrater.org

      - name: Email Subvurs insights report
        continue-on-error: true
        run: quantum-curator email-insights

      - name: Upload curator database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: curator-db-${{ github.run_id }}
          path: data/curator.db
          retention-days: 30
          if-no-files-found: warn

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/
          key: curator-db-${{ github.run_id }}

      - name: Notify on success
        if: success()
        run: echo "✓ Daily curation complete — Quantum Crier and Qrater deployed"

      - name: Notify on failure
        if: failure()
        run: echo "✗ Daily curation failed"
